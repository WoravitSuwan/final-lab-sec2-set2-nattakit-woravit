services:
  # ── Databases ──────────────────────────────────────────────────────
  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb # ใช้ชื่อตามเอกสาร Lab
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d authdb"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s

  task-db:
    image: postgres:15-alpine
    container_name: task-db
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5434:5432"
    volumes:
      - task_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskdb"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s

  activity-db:
    image: postgres:15-alpine
    container_name: activity-db
    environment:
      POSTGRES_DB: activitydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5435:5432"
    volumes:
      - activity_data:/var/lib/postgresql/data
      - ./activity-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d activitydb"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Services ───────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - DB_HOST=auth-db
      - DB_NAME=authdb
      - DB_USER=admin
      - DB_PASSWORD=secret123
      - DB_PORT=5432
      - DATABASE_URL=postgres://admin:secret123@auth-db:5432/authdb
      - JWT_SECRET=${JWT_SECRET:-engse207-sec2-shared-secret-change-this}
      - ACTIVITY_SERVICE_URL=http://activity-service:3003
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      auth-db: { condition: service_healthy }
    restart: unless-stopped

  task-service:
    build: ./task-service
    container_name: task-service
    environment:
      - DB_HOST=task-db
      - DB_NAME=taskdb
      - DB_USER=admin
      - DB_PASSWORD=secret123
      - DB_PORT=5432
      - DATABASE_URL=postgres://admin:secret123@task-db:5432/taskdb
      - JWT_SECRET=${JWT_SECRET:-engse207-sec2-shared-secret-change-this}
      - ACTIVITY_SERVICE_URL=http://activity-service:3003
      - PORT=3002
    ports:
      - "3002:3002"
    depends_on:
      task-db: { condition: service_healthy }
    restart: unless-stopped

  activity-service:
    build: ./activity-service
    container_name: activity-service
    environment:
      - DB_HOST=activity-db
      - DB_NAME=activitydb
      - DB_USER=admin
      - DB_PASSWORD=secret123
      - DB_PORT=5432
      - DATABASE_URL=postgres://admin:secret123@activity-db:5432/activitydb
      - JWT_SECRET=${JWT_SECRET:-engse207-sec2-shared-secret-change-this}
      - PORT=3003
    ports:
      - "3003:3003"
    depends_on:
      activity-db: { condition: service_healthy }
    restart: unless-stopped

volumes:
  auth_data:
  task_data:
  activity_data: