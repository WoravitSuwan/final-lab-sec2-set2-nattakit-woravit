<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 Log Dashboard — Final Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e2e8f0; --muted: #94a3b8;
      --blue: #3b82f6; --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; --purple: #a855f7;
    }
    /* เพิ่มไว้ในส่วน <style> บนสุดของไฟล์ */
.hidden {
  display: none !important;
}
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .header { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; }
    .header h1 { font-size:1.2rem; font-weight:700; }
    .container { max-width:1400px; margin:0 auto; padding:1.5rem; }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.5rem; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:.75rem; padding:1rem 1.25rem; }
    .stat-label { color:var(--muted); font-size:.75rem; text-transform:uppercase; }
    .stat-value { font-size:1.75rem; font-weight:700; margin-top:.25rem; }
    .filter-bar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .filter-bar input, .filter-bar select {
      background:var(--surface); border:1px solid var(--border); color:var(--text);
      padding:.45rem .75rem; border-radius:.5rem; font-size:.85rem; outline:none;
    }
    .filter-bar input { flex:1; min-width:200px; }
    .btn { padding:.45rem 1rem; border-radius:.5rem; border:none; cursor:pointer; font-size:.85rem; font-weight:600; }
    .btn-primary   { background:var(--blue); color:#fff; }
    .btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
    .log-table { background:var(--surface); border:1px solid var(--border); border-radius:.75rem; overflow:hidden; }
    .log-table-header { display:grid; grid-template-columns:160px 100px 75px 140px 1fr; gap:.5rem; padding:.6rem 1rem; background:#1a2d45; font-size:.72rem; color:var(--muted); font-weight:700; text-transform:uppercase; }
    .log-row { display:grid; grid-template-columns:160px 100px 75px 140px 1fr; gap:.5rem; padding:.65rem 1rem; border-top:1px solid var(--border); font-size:.82rem; align-items:center; }
    .log-row:hover { background:rgba(255,255,255,.03); }
    .badge { padding:.15rem .55rem; border-radius:.3rem; font-size:.7rem; font-weight:700; }
    .badge-INFO  { background:rgba(34,197,94,.15);  color:#4ade80; }
    .badge-WARN  { background:rgba(245,158,11,.15); color:#fbbf24; }
    .badge-ERROR { background:rgba(239,68,68,.15);  color:#f87171; }
    .service-tag { font-size:.72rem; padding:.1rem .45rem; border-radius:.3rem; background:rgba(59,130,246,.15); color:var(--blue); }
    .time-text { color:var(--muted); font-size:.75rem; font-family:'Courier New',monospace; }
    .empty { text-align:center; padding:3rem; color:var(--muted); }
    /* Login overlay */
    #login-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; }
    .login-box { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:2rem; width:340px; }
    .login-box h2 { margin-bottom:1.25rem; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:.82rem; color:var(--muted); margin-bottom:.35rem; }
    .form-group input { width:100%; background:#0f172a; border:1px solid var(--border); color:var(--text); padding:.6rem .75rem; border-radius:.5rem; font-size:.9rem; outline:none; }
  </style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h2>📊 Log Dashboard</h2>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:1rem">ต้องใช้บัญชี admin เท่านั้น</p>
    <div class="form-group">
      <label>Email</label>
      <input id="l-email" type="email" value="admin@lab.local">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="l-pass" type="password" value="adminpass">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="dashLogin()">เข้าสู่ระบบ</button>
    <p id="l-err" style="color:var(--red);font-size:.82rem;margin-top:.5rem"></p>
  </div>
</div>

<!-- Main Dashboard -->
<div class="header">
  <h1>📊 Log Dashboard — Task Board Final Lab</h1>
  <div style="display:flex;gap:1rem;align-items:center">
    <span id="logged-as" style="font-size:.82rem;color:var(--muted)"></span>
    <button class="btn btn-secondary" onclick="toggleAutoRefresh()" id="refresh-btn">⏸ Auto ON</button>
    <a href="index.html" style="color:var(--blue);font-size:.85rem;text-decoration:none">← Task Board</a>
  </div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Logs</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label" style="color:var(--green)">INFO</div>
      <div class="stat-value" style="color:var(--green)" id="stat-info">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label" style="color:var(--yellow)">WARN</div>
      <div class="stat-value" style="color:var(--yellow)" id="stat-warn">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label" style="color:var(--red)">ERROR</div>
      <div class="stat-value" style="color:var(--red)" id="stat-error">—</div>
    </div>
  </div>

<div class="filter-bar">
  <input id="f-search" type="text" placeholder="🔍 ค้นหาจากข้อความ หรือชื่อผู้ใช้...">
  
  <select id="f-scope" onchange="loadLogs()" class="hidden" style="border-color: var(--purple); font-weight: 600;">
    <option value="all">🌐 แสดงกิจกรรมทั้งหมด (System)</option>
    <option value="me">👤 แสดงเฉพาะของฉัน (My Logs)</option>
  </select>

  <select id="f-level" onchange="loadLogs()">
    <option value="">Event: ทั้งหมด</option>
    <option value="USER_LOGIN">USER_LOGIN</option>
    <option value="TASK_CREATED">TASK_CREATED</option>
    <option value="TASK_UPDATED">TASK_UPDATED</option>
    <option value="TASK_DELETED">TASK_DELETED</option>
  </select>
  
  <button class="btn btn-primary" onclick="loadLogs()">🔄 รีเฟรช</button>
  <button class="btn btn-secondary" onclick="clearFilters()">✕ ล้าง Filter</button>
</div>

  <div class="log-table">
    <div class="log-table-header">
      <div>เวลา</div><div>Service</div><div>Level</div><div>Event</div><div>Message</div>
    </div>
    <div id="log-rows"><div class="empty">⏳ กำลังโหลด...</div></div>
  </div>
  <p id="last-refresh" style="font-size:.75rem;color:var(--muted);text-align:right;margin-top:.5rem"></p>
</div>

<script>

  // ── CONFIG ──
  const authAPI = "https://auth-service-production-f062.up.railway.app"; 
  const activityAPI = "https://activity-service-production-d849.up.railway.app";
  const API = activityAPI; 

  let token = localStorage.getItem('jwt_token');
  let currentUser = null; 
  let autoRefresh = true;
  let refreshTimer = null;

  // 1. LOGIN LOGIC (รองรับทุกคน)
  async function dashLogin() {
    const email = document.getElementById('l-email').value.trim();
    const password = document.getElementById('l-pass').value;
    
    const res = await fetch(`${authAPI}/api/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    
    if (res.ok) {
      token = data.token;
      localStorage.setItem('jwt_token', token);
      currentUser = data.user;
      initDashboard();
    } else {
      document.getElementById('l-err').textContent = data.error || 'Login ล้มเหลว';
    }
  }

  // 1. ฟังก์ชันเปิดหน้า Dashboard
function initDashboard() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('logged-as').textContent = `👤 ${currentUser.username} (${currentUser.role})`;
  
  const scopeEl = document.getElementById('f-scope');
  const titleEl = document.querySelector('.header h1');

  if (currentUser.role === 'admin') {
    // ถ้าเป็น Admin: โชว์ปุ่มเลือก Scope และเปลี่ยนหัวข้อ
    scopeEl.classList.remove('hidden');
    titleEl.textContent = '📊 System Activity Logs';
  } else {
    // ถ้าเป็น User ทั่วไป: มั่นใจว่าปุ่มถูกซ่อน และหัวข้อเป็นส่วนตัว
    scopeEl.classList.add('hidden');
    titleEl.textContent = '📜 My Activity History';
  }
  
  loadLogs();
  startAutoRefresh();
}

// 2. ฟังก์ชัน Load Logs (แก้ไขตามที่คุณต้องการ)
async function loadLogs() {
  if (!token || !currentUser) return;

  // ตั้งค่าเริ่มต้น: ถ้าไม่ใช่ admin ให้ดึงแค่ /me
  let endpoint = '/api/activity/me';

  // ถ้าเป็น admin ให้ดึงค่าจากปุ่ม Filter ว่าจะดู /all หรือ /me
  if (currentUser.role === 'admin') {
    const scopeValue = document.getElementById('f-scope').value;
    endpoint = (scopeValue === 'all') ? '/api/activity/all' : '/api/activity/me';
  }
  
  const eventType = document.getElementById('f-level').value; 
  const search = document.getElementById('f-search').value.trim();
  const params = new URLSearchParams({ limit: 100 });
  
  if (eventType) params.set('event_type', eventType);

  try {
    const res = await fetch(`${API}${endpoint}?${params}`, { 
      headers: { 'Authorization': `Bearer ${token}` } 
    });
    
    if (res.status === 401) { 
      document.getElementById('login-overlay').style.display = 'flex'; 
      return; 
    }

    const data = await res.json();
    // รองรับทั้งชื่อฟิลด์ activities (จาก API /all และ /me)
    let logs = data.activities || [];

    // Filter การค้นหา (Search)
    if (search) {
      const q = search.toLowerCase();
      logs = logs.filter(l => 
        (l.summary || '').toLowerCase().includes(q) || 
        (l.event_type || '').toLowerCase().includes(q) ||
        (l.username || '').toLowerCase().includes(q)
      );
    }

    renderLogs(logs);
    updateStats(logs);
    
    document.getElementById('last-refresh').textContent = 
      `อัปเดต: ${new Date().toLocaleTimeString('th-TH')} | ${logs.length} รายการ`;
  } catch (err) {
    console.error("Fetch error:", err);
  }
}

  // 2. LOAD LOGS (แบ่งสิทธิ์ ADMIN / USER)
async function loadLogs() {
    if (!token || !currentUser) return;

    // 1. กำหนด Endpoint เริ่มต้นเป็น /me (สำหรับ User ทั่วไป)
    let endpoint = '/api/activity/me';

    // 2. ถ้าเป็น Admin ให้เช็คค่าจาก Select Box "f-scope" ว่าจะดู /all หรือ /me
    if (currentUser.role === 'admin') {
      const scopeEl = document.getElementById('f-scope');
      // เช็คว่ามี Element f-scope หรือไม่ (กัน Error)
      if (scopeEl) {
        endpoint = (scopeEl.value === 'all') ? '/api/activity/all' : '/api/activity/me';
      }
    }
    
    const eventType = document.getElementById('f-level').value; 
    const search = document.getElementById('f-search').value.trim();
    
    // ตั้งค่า Query Parameters
    const params = new URLSearchParams({ limit: 100 });
    if (eventType) params.set('event_type', eventType);

    try {
      // เรียก API ตาม Endpoint ที่เลือกไว้
      const res = await fetch(`${API}${endpoint}?${params}`, { 
        headers: { 'Authorization': `Bearer ${token}` } 
      });
      
      // ถ้า Token หมดอายุ หรือไม่ถูกต้อง ให้แสดงหน้า Login
      if (res.status === 401) { 
        document.getElementById('login-overlay').style.display = 'flex'; 
        return; 
      }

      // ถ้าเรียกสำเร็จ (200 OK)
      const data = await res.json();
      let logs = data.activities || [];

      // การค้นหาฝั่ง Client (Search filter)
      if (search) {
        const q = search.toLowerCase();
        logs = logs.filter(l => 
          (l.summary || '').toLowerCase().includes(q) || 
          (l.event_type || '').toLowerCase().includes(q) ||
          (l.username || '').toLowerCase().includes(q)
        );
      }

      // แสดงผลข้อมูลลงในตารางและอัปเดตสถิติ
      renderLogs(logs);
      updateStats(logs);
      
      document.getElementById('last-refresh').textContent = 
        `อัปเดต: ${new Date().toLocaleTimeString('th-TH')} | ${logs.length} รายการ`;
        
    } catch (err) {
      console.error("Fetch error:", err);
      // กรณีเชื่อมต่อไม่ได้ อาจจะแสดงข้อความเตือนในหน้าเว็บ
    }
  }

  // 3. RENDER TABLE
  function renderLogs(logs) {
    const container = document.getElementById('log-rows');
    if (!logs.length) { container.innerHTML = '<div class="empty">📭 ไม่พบประวัติกิจกรรม</div>'; return; }

    container.innerHTML = logs.map(log => {
      const time = new Date(log.created_at).toLocaleString('th-TH');
      const badgeClass = log.event_type.includes('ERROR') ? 'ERROR' : 
                         log.event_type.includes('WARN') ? 'WARN' : 'INFO';

      return `
        <div class="log-row">
          <div class="time-text">${time}</div>
          <div>
            <span class="service-tag" style="${currentUser.role === 'admin' ? 'background:rgba(168,85,247,.1);color:var(--purple)' : ''}">
              ${log.username || 'System'}
            </span>
          </div>
          <div><span class="badge badge-${badgeClass}">${log.event_type}</span></div>
          <div style="font-family:monospace;font-size:.7rem;color:var(--purple)">#${log.entity_id || '-'}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${log.summary}">
            ${log.summary || '—'}
          </div>
        </div>`;
    }).join('');
  }

  function updateStats(logs) {
    document.getElementById('stat-total').textContent = logs.length;
    document.getElementById('stat-info').textContent = logs.filter(l => !l.event_type.includes('ERROR') && !l.event_type.includes('WARN')).length;
    document.getElementById('stat-warn').textContent = logs.filter(l => l.event_type.includes('WARN')).length;
    document.getElementById('stat-error').textContent = logs.filter(l => l.event_type.includes('ERROR')).length;
  }

  function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(() => { if (autoRefresh) loadLogs(); }, 5000);
  }

  function toggleAutoRefresh() {
    autoRefresh = !autoRefresh;
    document.getElementById('refresh-btn').textContent = autoRefresh ? '⏸ Auto ON' : '▶ Auto OFF';
  }

  function clearFilters() {
    if (currentUser && currentUser.role === 'admin') {
    document.getElementById('f-scope').value = 'all';
  }
  document.getElementById('f-level').value = '';
  document.getElementById('f-search').value = '';
  loadLogs();
  }

  // 4. AUTO-VERIFY TOKEN
  if (token) {
    (async () => {
      try {
        const res = await fetch(`${authAPI}/api/auth/verify`, { 
          headers: { 'Authorization': `Bearer ${token}` } 
        });
        const data = await res.json();
        if (res.ok) {
          currentUser = data.user;
          initDashboard();
        } else {
          localStorage.removeItem('jwt_token');
        }
      } catch(e) { console.log("Verify failed"); }
    })();
  }

</script>
</body>
</html>
